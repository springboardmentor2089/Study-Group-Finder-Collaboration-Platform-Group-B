# Spring Boot Application Configuration
spring.application.name=study-group-finder-backend
server.port=8080
 
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/studygroup_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Dinesh@2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
 
# JWT Configuration
jwt.secret=mySecretKey
jwt.expiration=86400000
 
# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
 